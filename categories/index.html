<script>
  (function() {
    const STORAGE_KEY = 'sldawn-theme';
    const root = document.documentElement;

    function applyTheme(theme) {
      if (theme === 'dark' || theme === 'light') {
        root.setAttribute('data-theme', theme);
      }
    }

    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) applyTheme(saved);
    } catch (error) {}

    function mountHomeTemplate() {
      if (location.pathname !== '/' && location.pathname !== '/index.html') return;
      const content = document.querySelector('.content');
      const template = document.querySelector('#sld-home-template');
      if (content && template && !document.querySelector('.sld-hero')) {
        content.prepend(template.content.cloneNode(true));
      }
    }

    function applySiteLanguage() {
      if (!window.SLDawnI18n) return;
      window.SLDawnI18n.initSwitcher();
      window.SLDawnI18n.applyLang(window.SLDawnI18n.getLang());
    }

    document.addEventListener('DOMContentLoaded', function() {
      mountHomeTemplate();
      applySiteLanguage();
      document.body.classList.remove('sidebar-active');

      window.addEventListener('wheel', function(event) {
        if (event.ctrlKey) event.preventDefault();
      }, { passive: false });

      const loader = document.querySelector('.sld-loader');
      if (loader) {
        requestAnimationFrame(function() {
          loader.classList.add('is-hidden');
        });
      }

      document.querySelectorAll('.sld-shot img').forEach(function(img) {
        if (img.closest('.sld-photo-wall') || img.closest('.sld-photo-stage')) return;
        img.addEventListener('click', function() {
          let box = document.querySelector('.sld-lightbox');
          if (!box) {
            box = document.createElement('div');
            box.className = 'sld-lightbox';
            box.innerHTML = '<img alt="">';
            document.body.appendChild(box);
            box.addEventListener('click', function() {
              box.classList.remove('is-open');
            });
          }
          box.querySelector('img').src = img.src;
          box.querySelector('img').alt = img.alt;
          box.classList.add('is-open');
        });
      });

      const revealItems = document.querySelectorAll('.sld-reveal, .post-block');
      if ('IntersectionObserver' in window) {
        const observer = new IntersectionObserver(function(entries) {
          entries.forEach(function(entry) {
            if (entry.isIntersecting) {
              entry.target.classList.add('is-visible');
              observer.unobserve(entry.target);
            }
          });
        }, { threshold: 0.12 });
        revealItems.forEach(function(item) {
          item.classList.add('sld-reveal');
          observer.observe(item);
        });
      } else {
        revealItems.forEach(function(item) {
          item.classList.add('is-visible');
        });
      }

      const button = document.querySelector('.toggle-darkmode');
      if (!button) return;

      button.addEventListener('click', function() {
        const nextTheme = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        applyTheme(nextTheme);
        try {
          localStorage.setItem(STORAGE_KEY, nextTheme);
        } catch (error) {}
        applySiteLanguage();
      });
    });
  })();
</script>
